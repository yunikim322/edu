<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직원 교육 자료</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    .top-accent { position: fixed; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #3B6CB5, #7C6BC4, #5BA88C); z-index: 10; }
    h1 { font-size: 32px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #888; margin-bottom: 40px; }
    .card-list { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 700px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      text-decoration: none;
      color: #222;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(59,108,181,0.15);
      border-color: #3B6CB5;
    }
    .card .label { font-size: 13px; font-weight: 600; color: #3B6CB5; letter-spacing: 1px; margin-bottom: 6px; }
    .card .title { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .card .desc { font-size: 14px; color: #888; }
    .footer { margin-top: 50px; font-size: 13px; color: #bbb; }
    .pc-wrapper { }

    /* ===== PC 반응형 (768px 이상) ===== */
    @media (min-width: 768px) {
      body {
        background: #e8eaf0;
        padding: 0;
      }

      .pc-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        background: #f5f5f5;
        min-height: 100vh;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
        padding: 80px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .top-accent {
        max-width: 1100px;
        left: 50%;
        transform: translateX(-50%);
      }

      h1 { font-size: 40px; }
      .subtitle { font-size: 18px; margin-bottom: 50px; }

      .card-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 20px;
        max-width: 100%;
      }
      .card {
        flex: 1 1 calc(33.333% - 20px);
        min-width: 220px;
        padding: 36px 32px;
        border-radius: 20px;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 32px rgba(59,108,181,0.15);
        border-color: #3B6CB5;
      }
      .card .label { font-size: 14px; margin-bottom: 8px; }
      .card .title { font-size: 22px; margin-bottom: 8px; }
      .card .desc { font-size: 15px; line-height: 1.6; }

      .footer { margin-top: 60px; font-size: 14px; }
    }

    @media (min-width: 1200px) {
      .pc-wrapper {
        max-width: 1200px;
        padding: 100px 80px;
      }
      .top-accent { max-width: 1200px; }
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="pc-wrapper">
    <h1>직원 교육 자료</h1>
    <p class="subtitle">아래 교육 과정을 선택하세요</p>
  <div class="card-list">
    <a class="card" href="dementia.html">
      <div class="label">급여제공지침 교육</div>
      <div class="title">치매예방 및 관리지침</div>
      <div class="desc">치매의 정의, 증상, 단계별 변화, 예방수칙 및 돌봄 관리 지침</div>
    </a>
    <a class="card" href="cognitive.html">
      <div class="label">역량강화 교육</div>
      <div class="title">인지프로그램 대화법</div>
      <div class="desc">회상활동, 지남력 훈련, 오감자극 — 어르신 인지 기능을 향상시키는 세 가지 대화법</div>
    </a>
    <a class="card" href="human-rights.html">
      <div class="label">급여제공지침 교육</div>
      <div class="title">노인인권보호지침</div>
      <div class="desc">노인인권의 정의, 학대 유형 6가지, 신고의무, 예방과 대처법</div>
    </a>
    <a class="card" href="grievance.html">
      <div class="label">기타지침 교육</div>
      <div class="title">고충처리지침</div>
      <div class="desc">고충 접수 방법(오프라인·온라인), 익명성 보장, 처리 과정과 기한</div>
    </a>
  </div>
  <p class="footer">&copy; 2026 직원 교육 포털</p>
  </div><!-- /pc-wrapper -->
