<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>치매예방 및 관리지침 - 직원 교육</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      color: #fff;
    }
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17,17,17,0.95);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .top-bar a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
    }
    .top-bar a:hover {
      background: rgba(255,255,255,0.2);
    }
    .top-bar .title {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }
    .rotate-hint {
      display: none;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
    }
    @media (max-width: 768px) and (orientation: portrait) {
      .rotate-hint { display: block; }
    }
    .slides {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }
    @media (max-width: 768px) {
      .slides {
        padding: 8px 0;
        gap: 8px;
      }
    }
    .slides img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }
    @media (max-width: 768px) {
      .slides img {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">← 목록</a>
    <span class="title">치매예방 및 관리지침</span>
  </div>
  <div class="rotate-hint">화면을 가로로 돌리면 더 잘 보여요</div>
  <div class="slides">
    <img src="preview/dementia/01.png" alt="타이틀">
    <img src="preview/dementia/02.png" alt="챕터1 - 치매란 무엇인가">
    <img src="preview/dementia/03.png" alt="챕터2 - 증상개요">
    <img src="preview/dementia/04.png" alt="챕터2 - 인지기능장애">
    <img src="preview/dementia/05.png" alt="챕터2 - 행동장애">
    <img src="preview/dementia/06.png" alt="챕터2 - 정신행동증상">
    <img src="preview/dementia/07.png" alt="챕터3 - 단계별 변화">
    <img src="preview/dementia/08.png" alt="챕터4 - 3권3금3행">
    <img src="preview/dementia/09.png" alt="챕터5 - 안전도모 및 일상관리">
    <img src="preview/dementia/10.png" alt="챕터5 - 대화 기본원칙">
    <img src="preview/dementia/11.png" alt="마무리">
  </div>
</body>
</html>
