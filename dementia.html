<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치매예방 및 관리지침 - 직원 교육</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .slides {
      width: 100%;
      max-width: 1200px;
      padding: 60px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .slides img {
      width: 100%;
      display: block;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .back-link {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .back-link:hover {
      background: rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← 목록으로</a>
  <div class="slides">
    <img src="preview/01.png" alt="타이틀">
    <img src="preview/02.png" alt="챕터1 - 치매란 무엇인가">
    <img src="preview/03.png" alt="챕터2 - 증상개요">
    <img src="preview/04.png" alt="챕터2 - 인지기능장애">
    <img src="preview/05.png" alt="챕터2 - 행동장애">
    <img src="preview/06.png" alt="챕터2 - 정신행동증상">
    <img src="preview/07.png" alt="챕터3 - 단계별 변화">
    <img src="preview/08.png" alt="챕터4 - 3권3금3행">
    <img src="preview/09.png" alt="챕터5 - 안전도모 및 일상관리">
    <img src="preview/10.png" alt="챕터5 - 대화 기본원칙">
    <img src="preview/11.png" alt="마무리">
  </div>
</body>
</html>
